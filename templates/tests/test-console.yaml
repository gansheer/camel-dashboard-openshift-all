apiVersion: v1
kind: Pod
metadata:
  name: "{{ .Release.Name }}-test-console"
  namespace: {{ .Release.Namespace }}
  labels:
    app.kubernetes.io/name: {{ .Chart.Name }}
    app.kubernetes.io/instance: {{ .Release.Name }}
    app.kubernetes.io/component: console-test
    helm.sh/chart: "{{ .Chart.Name }}-{{ .Chart.Version }}"
  annotations:
    "helm.sh/hook": test
    "helm.sh/hook-weight": "3"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
    seccomp.security.alpha.kubernetes.io/pod: runtime/default
spec:
  securityContext:
    runAsNonRoot: true
    seccompProfile:
      type: RuntimeDefault
  containers:
  - name: test-console
    image: registry.access.redhat.com/ubi9/ubi-minimal:9.4
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      runAsNonRoot: true
      readOnlyRootFilesystem: true
    command: ['sh', '-c']
    args:
    - |
      if [ "{{ index .Values "camel-dashboard-console" "enabled" }}" = "true" ]; then
        set -e
        echo "========================================="
        echo "Testing Camel Dashboard Console Plugin"
        echo "========================================="

        # Check if console plugin service is reachable
        echo "Checking console plugin service..."
        SERVICE_NAME="camel-dashboard-console"
        SERVICE_PORT="{{ index .Values "camel-dashboard-console" "plugin" "port" | default 9443 }}"

        if ! curl -k -v --fail --connect-timeout 5 --retry 0 \
          https://${SERVICE_NAME}.{{ .Release.Namespace }}.svc.cluster.local:${SERVICE_PORT} \
          2>&1 | grep -q "200\|Connected\|SSL"; then
          echo "✗ FAIL: Console plugin service is not reachable at ${SERVICE_NAME}:${SERVICE_PORT}"
          exit 1
        fi
        echo "✓ Console plugin service is reachable at ${SERVICE_NAME}:${SERVICE_PORT}"

        echo ""
        echo "========================================="
        echo "Console plugin test: PASSED"
        echo "========================================="
      else
        echo "Camel Dashboard Console is disabled - skipping test"
      fi
  restartPolicy: Never
